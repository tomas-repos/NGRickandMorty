<!-- Capas de estrellas -->
<div class="stars-random" aria-hidden="true"></div>
<div class="stars-random2" aria-hidden="true"></div>
<div class="shooting-star" aria-hidden="true"></div>
<div class="shooting-star2" aria-hidden="true"></div>
<div class="spaceship" aria-hidden="true"></div>

<!-- Contenedor principal -->
<div class="app-container">
  <!-- Buscador -->
  <div class="search controls">
    <input 
      type="text" 
      [(ngModel)]="query" 
      (input)="onQueryChange($event.target.value)" 
      placeholder="Buscar personaje..." />

    <button (click)="clearSearch()" [disabled]="loading || !query">
      limpiar!
    </button>
  </div>

  <!-- Mensajes de error -->
   @if (error) {
    <div class="error">
      {{ error }}
    </div>
   }

  @if (loading) { <div class="loading">Cargando personajes...</div> }

  <!-- Lista de personajes -->
  @if (!loading && characters.length) { 
    <div class="characters-grid"> 
      @for (c of characters; track c.id) {
       <div class="character-card"> <img [src]="c.image" alt="{{c.name}}"> <h3>{{c.name}}</h3> <a [routerLink]="['/character', c.id]" class="detail-btn"> Ver detalle </a> </div>  
       
      } 
      </div> }
  <!-- Paginación -->
  @if (!loading && totalPages > 1) { 
    <div class="pagination"> 
      <button (click)="loadPage(page-1)"
      [disabled]="page === 1">Anterior</button> 
      <span>Página {{page}} de {{totalPages}}</span> 
      <button (click)="loadPage(page+1)" [disabled]="page >= totalPages">Siguiente</button> 
    </div> }
</div>

<div class="pagination">

  <input type="number"
         [(ngModel)]="jumpPage"
         min="1"
         [max]="totalPages"
         placeholder="Ir a página">
  <button (click)="loadPage(jumpPage!)"
          [disabled]="!jumpPage || jumpPage < 1 || jumpPage > totalPages">
    Ir
  </button>
</div>
